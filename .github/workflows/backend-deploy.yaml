
name: Deploy Backend

on:
  push:
    branches:
      - main
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: backend
  ECS_CLUSTER: FargateCluster
  ECS_SERVICE: backend-service
  ECS_TASK_DEFINITION: backend-task

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: WORKFLOW VERSION TEST
        run: |
          echo "VERSION-20260614-TEST"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
            -t backend:${{ github.sha }} \
            ./backend

      - name: Tag Docker Image
        run: |
          docker tag \
            backend:${{ github.sha }} \
            ${{ steps.login-ecr.outputs.registry }}/backend:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/backend:${{ github.sha }}

      - name: Download Current Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition backend-task \
            --query taskDefinition > task-definition.json

      - name: Update Image in Task Definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render-task-definition
        with:
          task-definition: task-definition.json
          container-name: backend
          image: ${{ steps.login-ecr.outputs.registry }}/backend:${{ github.sha }}

      - name: Show rendered task definition
        run: |
          echo "Rendered file:"
          echo "${{ steps.render-task-definition.outputs.task-definition }}"
          cat "${{ steps.render-task-definition.outputs.task-definition }}"

      - name: Print Image URI
        run: |
          echo "${{ steps.login-ecr.outputs.registry }}/backend:${{ github.sha }}"

      - name: Debug task definition
        run: cat task-definition.json

      - name: Print service variable
        run: |
          printf '[%s]\n' "${{ env.ECS_SERVICE }}"

      - name: Debug ECS values
          run: |
            echo "ECS_SERVICE='${{ env.ECS_SERVICE }}'"
            echo "ECS_CLUSTER='${{ env.ECS_CLUSTER }}'"

      - name: Verify ECS service manually
        run: |
          aws ecs describe-services \
          --cluster FargateCluster \
          --services backend-service \
          --region us-east-1

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2.4.0
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: backend-service
          cluster: FargateCluster
          wait-for-service-stability: true
