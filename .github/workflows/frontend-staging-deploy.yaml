name: Deploy Frontend Staging

on:
  push:
    branches:
      - develop
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-staging-deploy.yaml'
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: frontend
  ECS_CLUSTER: FargateClusterStaging
  ECS_SERVICE: frontend-service-staging
  ECS_TASK_DEFINITION: frontend-task-staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: WORKFLOW VERSION TEST
        run: |
          echo "VERSION-20260614-TEST"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
            -t frontend:${{ github.sha }} \
            ./frontend

      - name: Tag Docker Image
        run: |
          docker tag \
            frontend:${{ github.sha }} \
            ${{ steps.login-ecr.outputs.registry }}/frontend:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/frontend:${{ github.sha }}

      - name: Download Current Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition frontend-task-staging \
            --query taskDefinition > task-definition.json

      - name: Update Image in Task Definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render-task-definition
        with:
          task-definition: task-definition.json
          container-name: frontend
          image: ${{ steps.login-ecr.outputs.registry }}/frontend:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2.4.0
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: frontend-service-staging
          cluster: FargateClusterStaging
          wait-for-service-stability: true

